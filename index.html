<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Accès privé</title>
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
  <meta name="googlebot" content="noindex, nofollow" />
  <meta name="author" content="" />
  <meta name="description" content="" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }

    .container {
      text-align: center;
      padding: 60px 40px;
      max-width: 420px;
      width: 100%;
    }

    .lock-icon {
      font-size: 48px;
      margin-bottom: 28px;
      opacity: 0.6;
    }

    h1 {
      color: #ffffff;
      font-size: 20px;
      font-weight: 300;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #555;
      font-size: 13px;
      margin-bottom: 40px;
      letter-spacing: 1px;
    }

    input[type="password"] {
      width: 100%;
      padding: 16px 20px;
      background: #111;
      border: 1px solid #222;
      border-radius: 4px;
      color: #fff;
      font-size: 15px;
      letter-spacing: 2px;
      outline: none;
      transition: border-color 0.3s;
      margin-bottom: 12px;
    }

    input[type="password"]:focus { border-color: #444; }
    input[type="password"]::placeholder {
      letter-spacing: 1px;
      color: #333;
      font-size: 13px;
    }

    button {
      width: 100%;
      padding: 16px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #e8e8e8; }

    .error {
      color: #ff4444;
      font-size: 12px;
      margin-top: 14px;
      letter-spacing: 1px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .error.visible { opacity: 1; }
  </style>
</head>
<body>

  <div class="container">
    <div class="lock-icon">🔒</div>
    <h1>Accès privé</h1>
    <p class="subtitle">Ce site est protégé</p>

    <input
      type="password"
      id="passwordInput"
      placeholder="Entrez le mot de passe"
      autocomplete="off"
    />
    <button onclick="checkPassword()">Accéder →</button>
    <p class="error" id="errorMsg">Mot de passe incorrect</p>
  </div>

  <script>
    const CORRECT_PASSWORD = "Vital22";

    // Si déjà authentifié dans cette session, accès direct
    if (sessionStorage.getItem("auth") === "ok") {
      window.location.replace("main.html");
    }

    function checkPassword() {
      const input = document.getElementById("passwordInput").value;
      if (input === CORRECT_PASSWORD) {
        sessionStorage.setItem("auth", "ok");
        window.location.replace("main.html");
      } else {
        const error = document.getElementById("errorMsg");
        error.classList.add("visible");
        document.getElementById("passwordInput").value = "";
        document.getElementById("passwordInput").focus();
        setTimeout(() => error.classList.remove("visible"), 3000);
      }
    }

    document.addEventListener("keypress", function(e) {
      if (e.key === "Enter") checkPassword();
    });
  </script>

</body>
</html>
