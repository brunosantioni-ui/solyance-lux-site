<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solyance Lux — Accès sécurisé</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%231A1A1A'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' fill='%23C4A050' font-family='serif' font-size='40' font-weight='700'%3ES%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Montserrat',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.login-wrapper{position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:#0a0a0a}
.login-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(196,160,80,.08) 0%,transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(196,160,80,.05) 0%,transparent 50%)}
.login-card{position:relative;width:min(440px,90vw);padding:3rem 2.5rem;background:rgba(26,26,26,.92);border:1px solid rgba(196,160,80,.2);border-radius:16px;backdrop-filter:blur(20px);box-shadow:0 24px 80px rgba(0,0,0,.6),0 0 60px rgba(196,160,80,.06)}
.login-logo{text-align:center;margin-bottom:.5rem}
.login-logo svg{width:56px;height:56px}
.login-brand{text-align:center;font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:600;color:#C4A050;letter-spacing:.04em;margin-bottom:.25rem}
.login-sub{text-align:center;font-size:.75rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:2.2rem}
.login-label{display:block;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:.6rem}
.login-input-wrap{position:relative;margin-bottom:1.5rem}
.login-input{width:100%;padding:.85rem 3rem .85rem 1rem;background:rgba(255,255,255,.04);border:1px solid rgba(196,160,80,.18);border-radius:8px;color:#fff;font-family:'Montserrat',sans-serif;font-size:.95rem;outline:none;transition:border-color .3s,box-shadow .3s}
.login-input:focus{border-color:rgba(196,160,80,.5);box-shadow:0 0 20px rgba(196,160,80,.08)}
.login-input::placeholder{color:rgba(255,255,255,.2)}
.toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:rgba(255,255,255,.3);transition:color .2s;padding:4px}
.toggle-pw:hover{color:rgba(255,255,255,.6)}
.login-btn{width:100%;padding:.95rem;background:linear-gradient(135deg,#C4A050,#A8873A);border:none;border-radius:8px;color:#fff;font-family:'Montserrat',sans-serif;font-size:.85rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.login-btn:hover{box-shadow:0 8px 30px rgba(196,160,80,.3);transform:translateY(-1px)}
.login-btn:active{transform:translateY(0)}
.login-btn.loading{pointer-events:none;opacity:.7}
.login-btn.loading::after{content:'';position:absolute;width:20px;height:20px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;top:50%;left:50%;margin:-10px 0 0 -10px}
@keyframes spin{to{transform:rotate(360deg)}}
.login-error{margin-top:1rem;padding:.7rem 1rem;background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.25);border-radius:6px;color:#ef4444;font-size:.8rem;text-align:center;display:none}
.login-error.show{display:block;animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.login-footer{text-align:center;margin-top:2rem;font-size:.65rem;color:rgba(255,255,255,.2);letter-spacing:.08em}
.particles{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.particle{position:absolute;width:2px;height:2px;background:rgba(196,160,80,.3);border-radius:50%;animation:float linear infinite}
@keyframes float{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-10vh) scale(1);opacity:0}}
</style>
</head>
<body>
<div class="login-wrapper" id="loginWrapper">
  <div class="login-bg"></div>
  <div class="particles" id="particles"></div>
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" rx="12" fill="#1A1A1A" stroke="rgba(196,160,80,.3)" stroke-width="1"/>
        <text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle" fill="#C4A050" font-family="serif" font-size="40" font-weight="700">S</text>
      </svg>
    </div>
    <div class="login-brand">Solyance Lux</div>
    <div class="login-sub">Site institutionnel — Accès restreint</div>
    <form id="loginForm" autocomplete="off">
      <label class="login-label" for="password">Mot de passe</label>
      <div class="login-input-wrap">
        <input class="login-input" type="password" id="password" placeholder="Entrez votre mot de passe" autofocus>
        <button type="button" class="toggle-pw" id="togglePw" aria-label="Afficher le mot de passe">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <button type="submit" class="login-btn" id="loginBtn">Accéder au site</button>
      <div class="login-error" id="loginError">Mot de passe incorrect. Veuillez réessayer.</div>
    </form>
    <div class="login-footer">© 2025 Groupe Solyance SAS — Tous droits réservés</div>
  </div>
</div>

<script>
// Particles
(function(){const c=document.getElementById('particles');for(let i=0;i<20;i++){const p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'%';p.style.animationDuration=(8+Math.random()*12)+'s';p.style.animationDelay=Math.random()*10+'s';p.style.width=p.style.height=(1+Math.random()*2)+'px';c.appendChild(p)}})();

// Toggle password visibility
document.getElementById('togglePw').addEventListener('click',function(){
  const inp=document.getElementById('password');
  inp.type=inp.type==='password'?'text':'password';
});

// Derive AES key from password
async function deriveKey(password){
  const enc=new TextEncoder();
  const keyMaterial=await crypto.subtle.importKey('raw',enc.encode(password),'PBKDF2',false,['deriveBits']);
  const salt=enc.encode('solyance-lux-site-salt-v1');
  const bits=await crypto.subtle.deriveBits({name:'PBKDF2',salt:salt,iterations:100000,hash:'SHA-256'},keyMaterial,256);
  return await crypto.subtle.importKey('raw',bits,{name:'AES-GCM'},false,['decrypt']);
}

function b64toArr(b64){
  const bin=atob(b64);const arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
  return arr;
}

document.getElementById('loginForm').addEventListener('submit',async function(e){
  e.preventDefault();
  const pw=document.getElementById('password').value;
  const btn=document.getElementById('loginBtn');
  const err=document.getElementById('loginError');
  err.classList.remove('show');
  btn.classList.add('loading');
  btn.textContent='';

  try{
    const payload=JSON.parse(document.getElementById('encryptedPayload').textContent);
    const key=await deriveKey(pw);
    const nonce=b64toArr(payload.nonce);
    const data=b64toArr(payload.data);
    const decrypted=await crypto.subtle.decrypt({name:'AES-GCM',iv:nonce},key,data);
    const html=new TextDecoder().decode(decrypted);

    // Success — replace entire page with decrypted content
    document.open();
    document.write(html);
    document.close();
  }catch(ex){
    btn.classList.remove('loading');
    btn.textContent='Accéder au site';
    err.classList.add('show');
    document.getElementById('password').select();
  }
});
</script>
